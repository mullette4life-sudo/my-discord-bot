name: Hourly Discord Bot

on:
  schedule:
    - cron: '5 * * * *' # 매시 0분마다 실행 (UTC 기준)
  workflow_dispatch: # 수동으로도 실행해볼 수 있게 하는 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install beautifulsoup4 requests

    - name: Run script
      run: python bot.py
